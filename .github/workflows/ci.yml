name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Accuracy audit
        run: node scripts/accuracyAudit.cjs

      - name: Price consistency check
        run: node scripts/checkPriceConsistency.cjs

      - name: Build
        run: npm run build

      - name: Verify no API key leaked into bundle
        run: |
          if grep -rE 'AIza[A-Za-z0-9_-]{20,}' dist/; then
            echo "::error::Gemini API key detected in build output. The proxy is not in use."
            exit 1
          fi
          echo "OK — no AIza* tokens in dist/"
